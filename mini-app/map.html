<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>НЕФК - Ми на мапі</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/footer.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .map-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            margin: auto 0;
        }

        .map-container {
            width: 90%;
            max-width: 400px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #475569;
        }

        .map-container iframe {
            width: 100%;
            height: 250px;
            border: none;
            display: block;
        }

        .address-text {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            margin-top: auto;
        }
        .groups-grid {
            margin: 0 auto;
        }
    </style>
</head>

<body>

    <header class="college-header">
        <h1>Нововолинський <span>електромеханічний</span> фаховий коледж</h1>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="section-title">
                <h2>📍 Ми на мапі</h2>
                <p class="section-desc">Знайди нас за адресою</p>
            </div>

            <div class="map-wrapper">
                <div class="map-container">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2523.807415136123!2d24.1626916!3d50.5999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4724f7e0c1a5b555%3A0x9e5c1f9b1c1e3e0f!2z0KjQsNGF0YLQsNGA0YHRjNC60LAsIDE2LCDQndC-0LLQvtCy0L7Qu9C40L3RgdGM0LosINCS0L7Qu9C40L3RgdGM0LrQsCDQvtCx0LvQsNGB0YLRjA!5e0!3m2!1suk!2sua!4v1710000000000"
                        allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>

            <p class="address-text">📍 вул. Шахтарська, 16<br>м. Нововолинськ, Волинська область</p>

            <div class="groups-grid">
                <a href="https://maps.app.goo.gl/Sz4Vj5U9HYxWGVrZ7" class="group-btn">🗺️ Відкрити в Google Maps</a>
                <a href="index.html" class="group-btn">⬅️ Назад</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-developer">Розробник: <span>Ващук Роман</span> | Група: <span>1-КТ-24</span></p>
        </div>
    </footer>

    <script src="js/telegram.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
