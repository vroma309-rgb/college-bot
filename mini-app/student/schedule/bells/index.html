<!DOCTYPE html>

<head>

    <style>
        .bells-card {
            background: #334155;
            border-radius: 14px;
            padding: 20px;
            margin-top: 12px;

        }
        
        .bells-card .label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .bells-card .value {
            font-size: 15px;
            color: #e2e8f0;
            line-height: 1.8;
        }
        
    </style>
</head>
<body>

    <header class="college-header">

        <div class="container">
            <div class="section-title">
                <h2>🔔 Дзвінки</h2>
            </div>

            <div class="bells-card">
                <div class="label">Пн, Вт, Ср, Чт</div>
                <div class="value">
                    1. 08:30-09:50<br>
                    2. 10:05-11:25<br>
                    3. 12:05-13:25<br>
                    4. 13:40-15:00

            </div>

            <div class="bells-card">
                <div class="label">Пт, Сб</div>
                <div class="value">
                    1. 08:30-09:50<br>
                    2. 10:05-11:25<br>
                    3. 11:45-13:05<br>
                    4. 13:20-14:40
                </div>
            </div>

            <div class="groups-grid">
                <a href="../index.html" class="group-btn">⬅️ Назад</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-developer">Розробник: <span>Ващук Роман</span> | Група: <span>1-КТ-24</span></p>
        </div>
    </footer>

    <script src="../../../js/telegram.js"></script>
    <script src="../../../js/app.js"></script>
</body>
</html>
